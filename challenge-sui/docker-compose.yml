version: "3"

services:
  launcher:
    build:
      context: ..
      dockerfile: challenge-sui/Dockerfile
    ports:
      - "${PUBLIC_PORT}:8080"
    environment:
      - FLAG=${FLAG}
      - LAUNCHER_PORT=8080
      # - DISABLE_TICKET=true
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: "2g"
    tmpfs:
      - /tmp
